version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: transmetro_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: TransmetroAuthDb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - transmetro_network

  auth-server:
    build:
      context: ./TransmetroConecta.Auth
      dockerfile: Dockerfile
    container_name: transmetro_auth_api
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=TransmetroAuthDb;Username=postgres;Password=postgres
      - Jwt__Secret=A_SUPER_SECRET_KEY_FOR_TRANSMETRO_CONECTA_12345
      - Jwt__Issuer=TransmetroAuthServer
      - Jwt__Audience=TransmetroUsers
    depends_on:
      - db
    networks:
      - transmetro_network

volumes:
  pgdata:

networks:
  transmetro_network: